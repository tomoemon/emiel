name: release-tag

on:
  push:
    branches: [main]
    paths: [package.json]

jobs:
  release-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.value }}
      created: ${{ steps.tag-check.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: version
        name: Read version from package.json
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - id: tag-check
        name: Check if tag already exists
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag and GitHub release
        if: steps.tag-check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" --title "v$VERSION" --generate-notes

  publish:
    needs: release-tag
    # 新しいタグを作成した場合のみ publish する。GITHUB_TOKEN が起こした
    # release イベントは別 workflow をトリガーしないため、publish は別
    # workflow ではなく同一 workflow の後続ジョブとして実行する。
    if: needs.release-tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js 24.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest
      - run: pnpm i --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run fmt:check
      - run: pnpm run test
      - run: pnpm run build
      - name: Publish to npm
        run: npm publish --provenance --access public
