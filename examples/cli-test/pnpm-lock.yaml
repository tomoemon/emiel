lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      emiel:
        specifier: file:../..
        version: file:../..

packages:

  emiel@file:../..:
    resolution: {directory: ../.., type: directory}

snapshots:

  emiel@file:../..: {}
